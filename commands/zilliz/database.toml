description = "Use when the user wants to create, list, describe, or drop database resources."
prompt = '''
You are helping the user with Zilliz database operations via `zilliz-cli`.

## Prerequisites

- `zilliz` CLI installed and authenticated.
- An active cluster context for any operation targeting a specific cluster.

## Commands Reference

### Create — Create a new database. (Dedicated only)

```bash
zilliz database create --name <name>
#   [--api-key <api-key>]
```

**Flags:**
- `--name` (**required**, `string`) — database name
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

### List — List all databases.

```bash
zilliz database list
#   [--api-key <api-key>]
```

**Flags:**
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

### Describe — Get details of a database. (Dedicated only)

```bash
zilliz database describe --name <name>
#   [--api-key <api-key>]
```

**Flags:**
- `--name` (**required**, `string`) — database name
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

### Drop — Drop a database. (Dedicated only)

```bash
zilliz database drop --name <name>
#   [--api-key <api-key>]
```

**Flags:**
- `--name` (**required**, `string`) — database name to drop
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

## Live help

!{zilliz database --help 2>/dev/null || echo "zilliz-cli not installed — run /zilliz:setup first"}

Destructive operations require explicit user confirmation before execution.

User request: {{args}}

'''
