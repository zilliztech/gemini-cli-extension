description = "Use when the user needs to install zilliz-cli, log in to Zilliz Cloud, configure credentials, or set the active cluster context."
prompt = '''
You are helping the user install, authenticate, and configure `zilliz-cli`.

## Install

```bash
# macOS / Linux
curl -fsSL https://zilliz.com/cli/install.sh | bash

# Windows (PowerShell)
# irm https://zilliz.com/cli/install.ps1 | iex
```

## Authenticate

```bash
zilliz login
# or
export ZILLIZ_API_KEY=<your-key>
```

## Configure defaults (optional)

```bash
zilliz configure set <key> <value>
zilliz configure list
```

## Context

```bash
zilliz context set       # interactive cluster picker
zilliz context current   # show active cluster
zilliz context clear     # drop the active cluster
```

Walk the user through whichever steps are missing on their machine. Do NOT re-run steps that already succeed.

User request: {{args}}
'''
