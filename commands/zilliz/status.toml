description = "Show a comprehensive overview of the current Zilliz Cloud cluster — context, cluster details, databases, and collections with stats."
prompt = '''
You are giving the user a comprehensive overview of their Zilliz Cloud state: context, cluster, databases, and collections.

## Steps

1. Show current context:
   ```bash
   zilliz context current
   ```
2. Describe the active cluster:
   ```bash
   zilliz cluster describe --name <cluster>
   ```
3. List databases:
   ```bash
   zilliz database list --output table
   ```
4. For each database, list collections and their stats:
   ```bash
   zilliz collection list --database <db>
   zilliz collection describe --database <db> --collection <c>
   ```
5. Summarize: cluster health, total databases, total collections, any collections not loaded.

Use `--output json` + `--query` when you need to filter, e.g. for un-loaded collections.

User request: {{args}}
'''
