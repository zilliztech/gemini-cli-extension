description = "Use when the user wants to usage, or invoices billing resources."
prompt = '''
You are helping the user with Zilliz billing operations via `zilliz-cli`.

## Prerequisites

- `zilliz` CLI installed and authenticated.
- An active cluster context for any operation targeting a specific cluster.

## Commands Reference

### Usage — Show billing usage summary.

```bash
zilliz billing usage
#   [--month <month>  # default: today]
#   [--last <last>]
#   [--start <start>]
#   [--end <end>]
```

**Flags:**
- `--month` (`string`, default `today`) — Month: YYYY-MM, 'this', or 'last'
- `--last` (`string`) — Relative period: 7d, 1m, 1y
- `--start` (`string`) — Start time (ISO 8601 or YYYY-MM-DD)
- `--end` (`string`) — End time (ISO 8601 or YYYY-MM-DD)

### Invoices — List invoices.

```bash
zilliz billing invoices
#   [--page-size <page-size>  # default: 20]
#   [--page <page>  # default: 1]
```

**Flags:**
- `--page-size` (`integer`, default `20`) — Number of invoices per page
- `--page` (`integer`, default `1`) — Page number

## Live help

!{zilliz billing --help 2>/dev/null || echo "zilliz-cli not installed — run /zilliz:setup first"}

Destructive operations require explicit user confirmation before execution.

User request: {{args}}

'''
