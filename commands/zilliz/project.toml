description = "Use when the user wants to create, list, describe, or upgrade project resources."
prompt = '''
You are helping the user with Zilliz project operations via `zilliz-cli`.

## Prerequisites

- `zilliz` CLI installed and authenticated.
- An active cluster context for any operation targeting a specific cluster.

## Commands Reference

### Create — Create a new project.

```bash
zilliz project create --name <name> --plan <plan>
#   [--api-key <api-key>]
```

**Flags:**
- `--name` (**required**, `string`) — project name
- `--plan` (**required**, `string`) — [Standard, Enterprise, BusinessCritical]subscription plan
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

### List — List all projects.

```bash
zilliz project list
#   [--api-key <api-key>]
```

**Flags:**
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

### Describe — Get details of a project.

```bash
zilliz project describe --project-id <project-id>
#   [--api-key <api-key>]
```

**Flags:**
- `--project-id` (**required**, `string`) — project ID
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

### Upgrade — Upgrade project plan.

```bash
zilliz project upgrade --project-id <project-id> --plan <plan>
#   [--api-key <api-key>]
```

**Flags:**
- `--project-id` (**required**, `string`) — project ID
- `--plan` (**required**, `string`) — [Standard, Enterprise, BusinessCritical]target plan
- `--api-key` (`string`, env `ZILLIZ_API_KEY`) — API key (overrides env/config)

## Live help

!{zilliz project --help 2>/dev/null || echo "zilliz-cli not installed — run /zilliz:setup first"}

Destructive operations require explicit user confirmation before execution.

User request: {{args}}

'''
