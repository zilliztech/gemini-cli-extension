description = "Use when the user wants to manage Zilliz Cloud projects or storage volumes. For cloud regions and providers, run `/zilliz:cluster`."
prompt = '''
You are helping the user with Zilliz project-region operations via `zilliz-cli`.

## Prerequisites

1. CLI installed and logged in (run `/zilliz:setup`).

## Commands Reference

### Projects

#### Create a Project

```bash
zilliz project create --name <project-name> --plan <Standard|Enterprise|BusinessCritical>
```

#### List Projects

```bash
zilliz project list
```

#### Describe a Project

```bash
zilliz project describe --project-id <project-id>
```

#### Upgrade a Project

```bash
zilliz project upgrade --project-id <project-id> --plan <Standard|Enterprise|BusinessCritical>
```

### Volumes

#### Create a Volume

```bash
zilliz volume create \
  --project-id <project-id> \
  --region <cloud-region> \
  --name <volume-name>
```

#### List Volumes

```bash
zilliz volume list --project-id <project-id>
# Pagination: --page-size <n> --page <n>
# Fetch all pages: --all
```

#### Delete a Volume

```bash
zilliz volume delete --name <volume-name-to-delete>
```

## Guidance

- When the user wants to create a cluster, they need a project ID and region ID first. Guide them through `zilliz project list` and `zilliz cluster regions` (run `/zilliz:cluster`).
- Project `upgrade` does not include `Free` as a valid target plan -- only Serverless, Standard, and Enterprise.
- Before deleting a volume, confirm with the user.

## Live help

!{zilliz project-region --help 2>/dev/null || echo "zilliz-cli not installed — run /zilliz:setup first"}

Destructive operations require explicit user confirmation before execution.

User request: {{args}}
'''
